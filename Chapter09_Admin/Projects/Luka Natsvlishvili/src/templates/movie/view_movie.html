{% extends "layouts/base.html" %}

{% block title %}{{ movie.name }} - Coffeewood{% endblock %}

{% block content %}
<div class="container-md bg-white px-3 py-4 shadow border rounded">
    <img src="{{ url_for('static', filename=movie.img) }}"
         class="img-fluid mb-3 rounded"
         style="max-height: 350px; object-fit: cover;"
         alt="{{ movie.name }}">

    <table class="table">
        <tr>
            <th>ფილმის სახელი</th>
            <td>{{ movie.name }}</td>
        </tr>
        <tr>
            <th>გამოშვების თარიღი</th>
            <td>{{ movie.release_date }}</td>
        </tr>
        <tr>
            <th>ჟანრი</th>
            <td>{{ movie.genre }}</td>
        </tr>
    </table>
</div>
{% endblock %}
